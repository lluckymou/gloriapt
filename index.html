<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=5" />
  <meta name="theme-color" content="#F6B1C3" />
  <meta name="description" content="Glória PT — Portuguese learning portal for Korean speakers." />
  <title>Glória PT-BR</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="assets/gloria.png" />
  <link rel="apple-touch-icon" href="assets/gloria.png" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="app">
    <!-- Header: brand + language selector -->
    <header class="header">
      <div class="brand" id="brand">
        <img src="assets/gloria.png" alt="Glória PT" class="logo" />
        <div>
          <div class="title">Glória PT</div>
          <div class="subtitle" id="appSubtitle"></div>
        </div>
      </div>
      <div class="lang" id="langSel"></div>
    </header>

    <!-- Banners (data status + vocabulary queue lock) -->
    <div id="bannerHost"></div>

    <!-- Main routed view -->
    <main id="main"></main>
  </div>

  <!-- Core libs (order matters) -->
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/tts.js"></script>
  <script src="assets/js/ptnum.js"></script>
  <script src="assets/js/pttime.js"></script>
  <script src="assets/js/staticdata.js"></script>
  <script src="assets/js/conjugator.js"></script>

  <!-- Bundled fallback dataset (instant, out-of-the-box) -->
  <script src="assets/gloria_data_fallback.js"></script>
  <script src="assets/js/lexicon.js"></script>

  <!-- App + modules -->
  <script src="assets/js/app.js"></script>
</body>
</html>
